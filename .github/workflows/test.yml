name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python -m unittest discover tests -v

      - name: Smoke-test CLI tools
        run: |
          ./bin/analyze "ทำไมไม่ทักมาบ้าง" | python -m json.tool
          ./bin/signal --your-msgs 10 --their-msgs 8 \
                       --your-avg-len 80 --their-avg-len 25 \
                       --your-questions 4 --their-questions 1 \
                       --reply-minutes 240 --initiations 0 --short-streak 3 \
            | python -m json.tool
          ./bin/opener --list | python -m json.tool
          ./bin/opener --category class_workshop | python -m json.tool

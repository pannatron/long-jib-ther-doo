<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<title>{{TITLE}}</title>
<style>
  @page { size: A4; margin: 18mm 16mm; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Helvetica Neue", "Sukhumvit Set", "Noto Sans Thai", "Thonburi", sans-serif;
    color: #1a1a1a;
    line-height: 1.55;
    font-size: 11pt;
    margin: 0;
    padding: 0;
  }
  h1 {
    font-size: 22pt;
    border-bottom: 3px solid #d63384;
    padding-bottom: 8px;
    margin: 0 0 8px 0;
  }
  h2 {
    font-size: 15pt;
    color: #d63384;
    margin: 24px 0 10px 0;
    padding-bottom: 4px;
    border-bottom: 1px solid #f0d4e0;
  }
  h3 { font-size: 12pt; color: #495057; margin: 18px 0 8px 0; }
  .subtitle { font-size: 10pt; color: #6c757d; margin-bottom: 16px; }
  .meta {
    background: #fff5f8;
    border-left: 4px solid #d63384;
    padding: 10px 14px;
    margin: 12px 0 18px 0;
    font-size: 10pt;
  }
  .meta strong { color: #d63384; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0 14px 0;
    font-size: 10pt;
  }
  th, td {
    border: 1px solid #dee2e6;
    padding: 7px 10px;
    text-align: left;
    vertical-align: top;
  }
  th { background: #f8f9fa; font-weight: 600; color: #495057; }
  tr:nth-child(even) td { background: #fcfcfd; }
  .stage {
    background: #f8f9fa;
    border-radius: 6px;
    padding: 12px 14px;
    margin: 12px 0;
    border-left: 4px solid #6610f2;
  }
  .stage-title {
    font-weight: 600;
    color: #6610f2;
    margin-bottom: 6px;
    font-size: 11.5pt;
  }
  .stage-goal { margin-bottom: 8px; }
  .do-list, .dont-list {
    padding: 10px 14px;
    border-radius: 5px;
    margin: 8px 0;
  }
  .do-list { background: #e7f5ee; border-left: 4px solid #198754; }
  .dont-list { background: #fdecec; border-left: 4px solid #dc3545; }
  .do-list strong { color: #198754; }
  .dont-list strong { color: #dc3545; }
  ul, ol { margin: 6px 0; padding-left: 22px; }
  li { margin-bottom: 4px; }
  .script {
    background: #fff8e1;
    border: 1px dashed #b8860b;
    padding: 10px 14px;
    border-radius: 4px;
    margin: 8px 0;
    color: #5a4a00;
  }
  .script-label { font-weight: 600; margin-bottom: 4px; color: #6b4900; }
  .script-text { font-style: italic; }
  .warning {
    background: #fff3cd;
    border-left: 4px solid #ff9800;
    padding: 10px 14px;
    margin: 10px 0;
    border-radius: 4px;
  }
  .scenario {
    background: #f0f4ff;
    border-left: 4px solid #0d6efd;
    padding: 10px 14px;
    margin: 10px 0;
    border-radius: 4px;
  }
  .scenario b { color: #0d6efd; }
  .footer {
    margin-top: 30px;
    padding-top: 12px;
    border-top: 1px solid #dee2e6;
    text-align: center;
    color: #6c757d;
    font-size: 9pt;
  }
  .grade-red    { color: #dc3545; font-weight: 600; }
  .grade-yellow { color: #b8860b; font-weight: 600; }
  .grade-green  { color: #198754; font-weight: 600; }
  .pull-quote {
    text-align: center;
    font-size: 14pt;
    color: #d63384;
    margin: 18px 0;
    font-weight: 500;
    padding: 8px 16px;
    border-top: 1px solid #f0d4e0;
    border-bottom: 1px solid #f0d4e0;
  }
  .summary-box {
    background: linear-gradient(135deg, #fff5f8 0%, #fff8e1 100%);
    padding: 14px 18px;
    border-radius: 8px;
    margin: 14px 0;
  }
</style>
</head>
<body>

<h1>{{TITLE}}</h1>
<div class="subtitle">{{SUBTITLE}}</div>

<div class="meta">
{{META_HTML}}
</div>

<h2>{{OVERVIEW_HEADING}}</h2>
{{DIMENSIONS_TABLE}}

{{SUMMARY_BOX}}

<h2>{{ACTION_HEADING}}</h2>
{{STAGES_HTML}}

<h2>{{BACKUP_HEADING}}</h2>
{{SCENARIOS_HTML}}

<h2>{{QUICKREF_HEADING}}</h2>
{{QUICKREF_HTML}}

<h2>{{WARNINGS_HEADING}}</h2>
{{WARNINGS_HTML}}

{{PULL_QUOTE_HTML}}

<div class="footer">
{{FOOTER_HTML}}
</div>

</body>
</html>
